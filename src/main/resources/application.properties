spring.application.name=todo-service
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:tododb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Profile defaults
spring.profiles.default=prod

# Security default: keep H2 console disabled unless explicitly enabled in dev profile
spring.h2.console.enabled=false

# Past-due scheduler: runs every minute
past-due.check.cron=0 * * * * *

# Runtime hardening
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=20s
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20

# Operational endpoints (baseline)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.metrics.enabled=true
management.metrics.tags.application=${spring.application.name}
management.endpoint.health.show-details=never

# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Cache
spring.cache.type=caffeine

# Database pool tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# API write rate limiting (per client IP)
app.rate-limit.write.max-requests=120
app.rate-limit.write.window-seconds=60

# Request-aware logging pattern (with MDC requestId)
logging.pattern.level=%5p [req:%X{requestId:-}]
